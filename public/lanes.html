<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nightshift — lanes</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath d='M10 1.8 A6.6 6.6 0 1 0 14.6 8.4 A5.4 5.4 0 0 1 10 1.8 Z' fill='%23F0E2C0'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="lanes-page">

<header class="masthead">
  <div class="brand">
    <a class="home-link" href="/" title="board home">
      <svg class="logo" width="16" height="16" viewBox="0 0 16 16"><path d="M10 1.8 A6.6 6.6 0 1 0 14.6 8.4 A5.4 5.4 0 0 1 10 1.8 Z" fill="#F0E2C0"/></svg>
      <span class="wordmark">nightshift</span>
    </a>
    <span class="crumb-sep">/</span>
    <span class="lanes-crumb">lanes</span>
    <span class="crumb-sep">/</span>
    <span class="session-title mono" id="session-title">no session</span>
    <span class="session-picker" id="session-picker" hidden></span>
    <span class="agent-badge" id="agent-badge" hidden></span>
  </div>
  <div class="instruments">
    <span class="lanes-legend" id="lanes-legend">
      <span class="lg"><i class="lg-swatch lg-working"></i>working</span>
      <span class="lg"><i class="lg-swatch lg-idle"></i>idle</span>
      <span class="lg"><i class="lg-swatch lg-attention"></i>attention</span>
      <span class="lg"><i class="lg-mark lg-commit"></i>commit</span>
      <span class="lg"><i class="lg-mark lg-pr"></i>PR</span>
      <span class="lg"><i class="lg-mark lg-fail"></i>CI fail</span>
    </span>
    <button type="button" class="compress-toggle" id="compress-toggle" aria-pressed="true">
      <svg class="ct-glyph" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 3.5 2.5 8 6 12.5"/><path d="M10 3.5 13.5 8 10 12.5"/></svg>
      <span class="ct-label">compress idle</span>
    </button>
    <a class="icon-btn" id="board-link" href="/" title="open the board">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="1.5" y="2" width="3.4" height="12" rx="1"/><rect x="6.3" y="2" width="3.4" height="8" rx="1"/><rect x="11.1" y="2" width="3.4" height="10" rx="1"/></svg>
    </a>
  </div>
</header>

<main class="lanes-main" id="lanes-main">
  <canvas id="lanes-canvas"></canvas>
  <div class="lanes-tooltip" id="lanes-tooltip" hidden></div>
  <div class="lanes-empty" id="lanes-empty" hidden>no events on this tape</div>
  <div class="lanes-hint">scroll to zoom · drag to pan · click a mark to replay</div>
</main>

<script type="module" src="lanes.js"></script>
</body>
</html>
